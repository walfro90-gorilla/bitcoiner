name: CI

# Sello de calidad: typecheck (web + worker), tests, build y estrés.
#
# ⚠️ Auto-run en push/PR DESHABILITADO temporalmente: la cuenta de GitHub tiene un bloqueo de
# facturación que impide que Actions arranque ("account is locked due to a billing issue" — el job
# ni inicia, no es un fallo de código). Para no ensuciar el repo (público) con runs en rojo, dejamos
# el workflow solo en modo MANUAL. La verificación equivalente corre LOCAL en cada commit:
#   npm run lint · npm run check:worker · npm test · npm run stress · npm run build
# Para reactivar la CI automática tras resolver el billing, restaura el bloque de abajo:
#   push: { branches: [main, 'feat/**'] }
#   pull_request: { branches: [main] }
on:
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint (no bloqueante — hay hallazgos preexistentes conocidos)
        run: npm run lint
        continue-on-error: true
      - name: Typecheck worker
        run: npm run check:worker
      - name: Tests (núcleo + worker)
        run: npm test
      - name: Stress (invariantes del núcleo, 0 violaciones)
        run: npm run stress
      - name: Build web
        run: npm run build
