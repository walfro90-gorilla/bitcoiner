name: CI

# Sello de calidad: typecheck (web + worker), tests, build y estrés.
#
# Auto-run DESACTIVADO (solo manual): la cuenta de GitHub Actions está bloqueada por facturación,
# así que los runs fallan en ~3 s SIN llegar a correr — NO es fallo de código (87/87 tests pasan
# en local). Para no ensuciar el repo público con runs en rojo ante el jurado, queda en
# workflow_dispatch. La verificación equivalente corre LOCAL en cada commit: lint · check:worker
# · test · stress · build. Restaurar push/pull_request cuando se resuelva el billing.
on:
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint (no bloqueante — hay hallazgos preexistentes conocidos)
        run: npm run lint
        continue-on-error: true
      - name: Typecheck worker
        run: npm run check:worker
      - name: Tests (núcleo + worker)
        run: npm test
      - name: Stress (invariantes del núcleo, 0 violaciones)
        run: npm run stress
      - name: Build web
        run: npm run build
